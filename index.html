<!DOCTYPE html>
<html>
<head>
    <title>Serenity</title>
    <style>
        /* Container styling */
        .map-container {
            width: 80%;
            height: 500px;
            margin: 0 auto; /* Center the container */
            border: 2px solid #ccc;
        }

        /* Iframe styling to fill container */
        .map-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <h2>Serenity Map</h2>
    
    <div class="map-container">
        <iframe src="map.html"></iframe>
    </div>

<div>

<table>
  <caption style="background-color: aqua;"><b>Things to do</b></caption>
  <thead>
    <tr>
      <th>Check</th>
      <th>Item</th>
    </tr>
  </thead>
  <tbody>
    <tr>
      <td><input type="checkbox" class="todo-checkbox" data-id="hepburn-spa"></td>
      <td>Visit the Hepburn Spa</td>
    </tr>
    <tr>
      <td><input type="checkbox" class="todo-checkbox" data-id="explore-convent"></td>
      <td>Explore the Convent</td>
    </tr>
  </tbody>
</table>
</div>

<script>
  // Load saved checkboxes on page load
  document.addEventListener('DOMContentLoaded', function() {
    const checkboxes = document.querySelectorAll('.todo-checkbox');
    checkboxes.forEach(checkbox => {
      const id = checkbox.getAttribute('data-id');
      const isSaved = localStorage.getItem(id);
      if (isSaved === 'true') {
        checkbox.checked = true;
      }
    });
  });

  // Save checkbox state when clicked
  document.querySelectorAll('.todo-checkbox').forEach(checkbox => {
    checkbox.addEventListener('change', function() {
      const id = this.getAttribute('data-id');
      localStorage.setItem(id, this.checked);
    });
  });
</script>

</body>
</html>
