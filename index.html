<!DOCTYPE html>
<html>
<head>
    <title>Serenity</title>
    <style>
        /* Container styling */
        .map-container {
            width: 80%;
            height: 500px;
            margin: 0 auto; /* Center the container */
            border: 2px solid #ccc;
        }

        /* Iframe styling to fill container */
        .map-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <h2>Serenity Map</h2>
    
    <div class="map-container">
        <iframe src="map.html"></iframe>
    </div>

<div>

<table>
  <caption style="background-color: aqua;"><b>Things to do</b></caption>
  <thead>
    <tr>
      <th>Check</th>
      <th>Item</th>
    </tr>
  </thead>
  <tbody>
    <tr>
      <td><input type="checkbox"></td>
      <td>Visit the Hepburn Spa</td>
    </tr>
    <tr>
      <td><input type="checkbox"></td>
      <td>Explore the Convent</td>
    </tr>
  </tbody>
</table>
</div>

</body>
</html>
